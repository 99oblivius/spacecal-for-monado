name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git gcc pkg-config \
            gtk4-devel libadwaita-devel openxr-devel monado-devel \
            cargo rust clippy

      - uses: actions/checkout@v4

      - name: Check
        run: cargo check --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Test
        run: cargo test --lib --locked

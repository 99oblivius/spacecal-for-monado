name: Release & AUR Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container: fedora:latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            git gcc pkg-config \
            gtk4-devel libadwaita-devel openxr-devel \
            cargo rust

      - uses: actions/checkout@v4

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: cargo test --lib --locked

      - name: Build release
        run: cargo build --release --locked

      - name: Build deb package
        run: |
          cargo install cargo-deb
          cargo deb --no-build

      - name: Build rpm package
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm

      - name: Compute checksum from GitHub tarball
        id: checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl -sL "https://github.com/99oblivius/spacecal-for-monado/archive/refs/tags/v${VERSION}.tar.gz" \
            -o spacecal-for-monado-${VERSION}.tar.gz
          SHA=$(sha256sum spacecal-for-monado-${VERSION}.tar.gz | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "${SHA}  spacecal-for-monado-${VERSION}.tar.gz" > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            spacecal-for-monado-${{ steps.version.outputs.version }}.tar.gz
            SHA256SUMS
            target/debian/*.deb
            target/generate-rpm/*.rpm

  publish-aur-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PKGBUILD
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
          SHA256: ${{ needs.build-and-release.outputs.sha256 }}
        run: |
          sed -i "s/pkgver=.*/pkgver=${VERSION}/; s/sha256sums=.*/sha256sums=('${SHA256}')/" \
            PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: spacecal-for-monado
          pkgbuild: PKGBUILD
          commit_username: 99oblivius
          commit_email: projects@oblivius.dev
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.build-and-release.outputs.version }}"

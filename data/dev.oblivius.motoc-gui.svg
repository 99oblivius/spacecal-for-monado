<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b5ce7"/>
      <stop offset="100%" style="stop-color:#3d348b"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Isometric room corner -->
  <g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- Floor (diamond shape with grid) -->
    <g opacity="0.7">
      <!-- Floor outline -->
      <path d="M64 108 L20 86 L64 64 L108 86 Z"/>
      <!-- Floor grid lines (left to right) -->
      <line x1="31" y1="80.5" x2="75" y2="102.5"/>
      <line x1="42" y1="75" x2="86" y2="97"/>
      <line x1="53" y1="69.5" x2="97" y2="91.5"/>
      <!-- Floor grid lines (right to left) -->
      <line x1="97" y1="80.5" x2="53" y2="102.5"/>
      <line x1="86" y1="75" x2="42" y2="97"/>
      <line x1="75" y1="69.5" x2="31" y2="91.5"/>
    </g>

    <!-- Left wall with grid -->
    <g opacity="0.85">
      <!-- Wall outline -->
      <path d="M20 86 L20 42 L64 20 L64 64 Z"/>
      <!-- Horizontal grid lines -->
      <line x1="20" y1="53" x2="64" y2="31"/>
      <line x1="20" y1="64" x2="64" y2="42"/>
      <line x1="20" y1="75" x2="64" y2="53"/>
      <!-- Vertical grid lines -->
      <line x1="31" y1="80.5" x2="31" y2="36.5"/>
      <line x1="42" y1="75" x2="42" y2="31"/>
      <line x1="53" y1="69.5" x2="53" y2="25.5"/>
    </g>

    <!-- Right wall with grid -->
    <g opacity="0.85">
      <!-- Wall outline -->
      <path d="M108 86 L108 42 L64 20 L64 64 Z"/>
      <!-- Horizontal grid lines -->
      <line x1="108" y1="53" x2="64" y2="31"/>
      <line x1="108" y1="64" x2="64" y2="42"/>
      <line x1="108" y1="75" x2="64" y2="53"/>
      <!-- Vertical grid lines -->
      <line x1="97" y1="80.5" x2="97" y2="36.5"/>
      <line x1="86" y1="75" x2="86" y2="31"/>
      <line x1="75" y1="69.5" x2="75" y2="25.5"/>
    </g>
  </g>

  <!-- Bold corner edges -->
  <g fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="64" y1="20" x2="64" y2="108"/>
    <line x1="20" y1="86" x2="64" y2="64"/>
    <line x1="108" y1="86" x2="64" y2="64"/>
  </g>
</svg>
